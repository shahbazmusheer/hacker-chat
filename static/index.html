<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RED_LINE_ZETA_PRO</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #200;
            --bg: #000;
            --green: #0f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            height: 100vh;
        }

        #terminal {
            height: 95vh;
            border: 1px solid var(--red);
            display: flex;
            flex-direction: column;
            padding: 10px;
            position: relative;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 5px;
        }

        .msg-container {
            margin-bottom: 12px;
            border-left: 2px solid #300;
            padding-left: 10px;
            position: relative;
        }

        .usr {
            color: #fff;
            font-weight: bold;
        }

        .ts {
            color: #500;
            font-size: 0.8em;
            float: right;
        }

        .reply-quote {
            background: #111;
            border-left: 2px solid #fff;
            padding: 5px;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 5px;
        }

        #presence-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            text-align: right;
            color: var(--green);
            font-size: 0.9em;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            border: 1px solid var(--red);
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        input {
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-family: inherit;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            outline: none;
        }

        .btn {
            background: var(--dark);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            margin: 5px;
        }
    </style>
</head>

<body>

    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2 style="color:#fff">UPLINK_REQUIRED</h2>
            <input type="text" id="my-alias" placeholder="IDENTITY_CODE">
            <input type="text" id="target-id" placeholder="TARGET_NODE">
            <div style="margin: 10px 0;">
                <label><input type="radio" name="type" value="private" checked> PRIVATE</label>
                <label><input type="radio" name="type" value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()" style="width: 100%;">ESTABLISH_CONNECTION</button>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-overlay" class="overlay hidden" style="z-index:3000;">
        <div class="modal">
            <h2 style="color:#fff">ADMIN_CONSOLE</h2>
            <input type="text" id="adm-user" placeholder="ADMIN_ID">
            <input type="password" id="adm-pass" placeholder="PASSKEY">
            <div id="admin-data"
                style="height:150px; overflow-y:auto; background:#080000; color:var(--green); font-size:0.8em; text-align:left; padding:10px; margin-bottom:10px; border:1px solid #300;">
                Awaiting login...</div>
            <button class="btn" onclick="adminFetch()">STATS</button>
            <button class="btn" onclick="adminPurge()" style="background:#500;">PURGE_LOGS</button>
            <button class="btn" onclick="closeAdmin()">CLOSE</button>
        </div>
    </div>

    <div id="terminal">
        <div id="presence-panel">
            <div id="presence-list">SCANNING...</div>
            <div id="target-status"></div>
        </div>
        <div style="border-bottom: 1px solid #300; padding-bottom: 5px; font-size: 0.8em;">
            TARGET: <span id="chan-label">...</span> | CTRL+SHIFT+X FOR ADMIN
        </div>
        <div id="chat-box">
            <div class="msg-container" style="color:#fff;">[SYSTEM] Uplink initialized. Waiting for data...</div>
        </div>
        <div id="reply-preview" class="hidden"
            style="background:#200; padding:5px; font-size:0.8em; border-top:1px solid red;">
            Replying to <span id="reply-to"></span>... <span onclick="cancelReply()"
                style="float:right; cursor:pointer;">[X]</span>
        </div>
        <div style="border-top:1px solid #200; padding-top:10px; display:flex;">
            <span style="margin-right:10px; font-weight:bold;">></span>
            <input type="text" id="chat-in" placeholder="Message..." autofocus autocomplete="off">
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false, lastId = 0, replyData = null;

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('chan-label').innerText = target;
            sync();
            setInterval(sync, 2500);
        }

        async function sync() {
            try {
                const res = await fetch(`/api/messages?user=${user}&target=${target}&is_group=${isGroup}&last_id=${lastId}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const box = document.getElementById('chat-box');
                    data.forEach(m => {
                        if (document.getElementById(`msg-${m.id}`)) return;
                        const div = document.createElement('div');
                        div.className = 'msg-container';
                        div.id = `msg-${m.id}`;
                        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        let p = m.parent_content ? `<div class="reply-quote">${m.parent_sender}: ${m.parent_content}</div>` : '';
                        div.innerHTML = `<div class="usr">${m.sender} <span class="ts">${time}</span> <span style="cursor:pointer; color:red;" onclick="setReply('${m.sender}','${m.content}')">[reply]</span></div>${p}<div style="color:red;">${m.content}</div>`;
                        box.appendChild(div);
                        if (m.id > lastId) lastId = m.id;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            } catch (e) { console.error(e); }
        }

        function setReply(s, c) {
            replyData = { parent_sender: s, parent_content: c };
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('reply-to').innerText = s;
            document.getElementById('chat-in').focus();
        }

        function cancelReply() { replyData = null; document.getElementById('reply-preview').classList.add('hidden'); }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value; e.target.value = "";
                const payload = { sender: user, recipient: target, content: val, is_group: isGroup, ...replyData };
                cancelReply();
                await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                sync();
            }
        });

        // Admin Shortcut
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.code === 'KeyX') document.getElementById('admin-overlay').classList.remove('hidden');
        });

        async function adminFetch() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p }) });
            if (res.status === 200) {
                const d = await res.json();
                document.getElementById('admin-data').innerHTML = `<b>ACTIVE:</b> ${d.users.map(x => x.username).join(', ')}`;
            } else { alert("AUTH_FAIL"); }
        }

        function closeAdmin() { document.getElementById('admin-overlay').classList.add('hidden'); }
    </script>
</body>

</html>
