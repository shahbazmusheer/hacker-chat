<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HACKER CHAT</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #4b0000;
            --bg-black: #050000;
            --glow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        body {
            background-color: var(--bg-black);
            color: var(--primary-red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-shadow: var(--glow);
        }

        /* CRT Effects */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #terminal-wrap {
            border: 2px solid var(--dark-red);
            padding: 20px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px var(--dark-red);
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            filter: blur(0px);
            transition: filter 0.3s;
        }

        .msg {
            margin-bottom: 10px;
            border-left: 2px solid var(--dark-red);
            padding-left: 10px;
        }

        .ts {
            color: var(--dark-red);
            font-size: 0.8em;
        }

        .usr {
            font-weight: bold;
            color: #fff;
        }

        /* ADVANCED HACKER MODAL */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hacker-modal {
            width: 400px;
            padding: 30px;
            border: 2px solid var(--primary-red);
            background: #110000;
            box-shadow: 0 0 30px var(--primary-red);
            text-align: center;
            position: relative;
        }

        .hacker-modal h2 {
            margin-top: 0;
            letter-spacing: 4px;
            color: #fff;
            font-size: 1.2em;
        }

        .hacker-modal input {
            background: #000;
            border: 1px solid var(--primary-red);
            color: #fff;
            padding: 10px;
            width: 80%;
            text-align: center;
            font-family: inherit;
            outline: none;
            margin-top: 20px;
        }

        .hacker-modal .btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid var(--primary-red);
            background: var(--dark-red);
            color: #fff;
            cursor: pointer;
            font-family: inherit;
        }

        .hacker-modal .btn:hover {
            background: var(--primary-red);
            color: #000;
        }

        .hidden {
            display: none !important;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        #chat-input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-family: inherit;
            font-size: 1.2em;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dark-red);
        }
    </style>
</head>

<body>

    <!-- INITIAL LOGIN MODAL -->
    <div id="modal-overlay">
        <div id="login-modal" class="hacker-modal">
            <h2>ACCESS_REQUIRED</h2>
            <p>[SYSTEM] Identify yourself to join uplink...</p>
            <input type="text" id="alias-input" placeholder="HACKER_ALIAS" maxlength="15">
            <br>
            <button class="btn" onclick="startUplink()">INITIALIZE_SESSION</button>
        </div>

        <!-- CLEAR CHAT OVERRIDE MODAL -->
        <div id="clear-modal" class="hacker-modal hidden">
            <h2 style="color: #ff0000; animation: blink 0.5s infinite;">SYSTEM_OVERRIDE</h2>
            <p>CAUTION: PURGING DATABASE LOGS</p>
            <input type="password" id="admin-pass-input" placeholder="ROOT_PASSWORD">
            <br>
            <button class="btn" onclick="confirmWipe()" style="border-color: #fff;">EXECUTE_WIPE</button>
            <button class="btn" onclick="closeClearModal()">ABORT</button>
        </div>
    </div>

    <div id="terminal-wrap">
        <div
            style="font-size: 0.8em; border-bottom: 1px solid var(--dark-red); margin-bottom: 10px; padding-bottom: 5px; display: flex; justify-content: space-between;">
            <span>CHANNEL: ENCRYPTED_HACKER-CHAT</span>
            <span>STATUS: <span id="conn-status">WAITING</span></span>
        </div>
        <div id="chat-box">
            <div id="messages"></div>
        </div>
        <div class="input-line">
            <span id="prompt-label" style="margin-right:10px; font-weight:bold;">GUEST@ROOT:~$</span>
            <input type="text" id="chat-input" autocomplete="off" disabled>
        </div>
    </div>

    <script>
        let myAlias = "";

        // 1. Handling Initial Login
        function startUplink() {
            const input = document.getElementById('alias-input');
            if (input.value.trim() === "") return;

            myAlias = input.value.trim();
            document.getElementById('prompt-label').innerText = `${myAlias.toUpperCase()}@NETWORK:~$`;
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('chat-input').disabled = false;
            document.getElementById('chat-input').focus();
            document.getElementById('conn-status').innerText = "CONNECTED";

            loadMessages();
            setInterval(loadMessages, 2500);
        }

        // 2. Clear Modal Logic
        function openClearModal() {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('clear-modal').classList.remove('hidden');
            document.getElementById('admin-pass-input').focus();
        }

        function closeClearModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('clear-modal').classList.add('hidden');
            document.getElementById('chat-input').focus();
        }

        async function confirmWipe() {
            const pass = document.getElementById('admin-pass-input').value;
            const res = await fetch('/api/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            const status = await res.json();

            if (status.status === "cleared") {
                alert("--- LOGS PURGED ---");
                closeClearModal();
                loadMessages();
            } else {
                alert("ACCESS DENIED: INCORRECT AUTHENTICATION");
                document.getElementById('admin-pass-input').value = '';
            }
        }

        // 3. Core Chat Logic
        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const data = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = data.map(m => `
                <div class="msg">
                    <span class="ts">[${new Date(m.created_at).toLocaleTimeString()}]</span>
                    <span class="usr">${m.sender}:</span> ${m.content}
                </div>`).join('');
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            } catch (e) { }
        }

        document.getElementById('chat-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                const cmd = e.target.value.trim();
                e.target.value = '';

                if (cmd === "clear-hacker-chat") {
                    openClearModal();
                    return;
                }

                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: myAlias, content: cmd })
                });
                loadMessages();
            }
        });

        // Handle Enter key on Alias input
        document.getElementById('alias-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startUplink();
        });
    </script>
</body>

</html>
