<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACKER CHAT ZETA</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #1a0000;
            --bg: #050000;
            --green: #0f0;
            --glow: 0 0 12px rgba(255, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            height: 100vh;
        }

        /* CRT Scanline Effect */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        #terminal {
            height: 96vh;
            border: 1px solid var(--red);
            display: flex;
            flex-direction: column;
            padding: 12px;
            position: relative;
            box-shadow: 0 0 15px var(--dark);
        }

        /* Header Fixes */
        #header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--red);
            padding-bottom: 8px;
            font-size: 0.9em;
            align-items: center;
        }

        .btn-sm {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 2px 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8em;
        }

        .btn-sm:hover {
            background: #fff;
            color: #000;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin: 10px 0;
        }

        /* Transparent Hacker Modals */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: rgba(10, 0, 0, 0.8);
            border: 1px solid var(--red);
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: var(--glow);
            border-radius: 4px;
        }

        .hidden {
            display: none !important;
        }

        /* Flex Selection */
        .radio-flex {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 15px 0;
            font-size: 0.9em;
            color: #fff;
        }

        /* Message Styling */
        .msg-container {
            margin-bottom: 12px;
            border-left: 2px solid #200;
            padding-left: 12px;
        }

        .usr {
            color: #fff;
            font-weight: bold;
        }

        .ts {
            color: #500;
            font-size: 0.8em;
            margin: 0 10px;
        }

        .reply-link {
            cursor: pointer;
            color: var(--red);
            text-decoration: underline;
            font-size: 0.8em;
        }

        .reply-quote {
            background: rgba(255, 255, 255, 0.05);
            border-left: 2px solid #fff;
            padding: 5px;
            font-size: 0.8em;
            color: #888;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: #fff;
            font-family: inherit;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            outline: none;
        }

        input:focus {
            border-color: var(--red);
        }

        .btn {
            background: var(--dark);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--red);
            color: #000;
        }
    </style>
</head>

<body>

    <!-- LOGIN MODAL -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2 style="color:#fff; letter-spacing: 2px;">UPLINK_INIT</h2>
            <input type="text" id="my-alias" placeholder="IDENT_CODE" autocomplete="off">
            <input type="text" id="target-id" placeholder="TARGET_NODE" autocomplete="off">
            <div class="radio-flex">
                <label><input type="radio" name="type" value="private" checked> PRIVATE</label>
                <label><input type="radio" name="type" value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()" style="width: 100%;">ESTABLISH_UPLINK</button>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-overlay" class="overlay hidden" style="z-index:3000;">
        <div class="modal">
            <h2 style="color:#fff">ADMIN_CONSOLE</h2>
            <input type="text" id="adm-user" placeholder="ADMIN_ID">
            <input type="password" id="adm-pass" placeholder="PASSKEY">
            <button class="btn" onclick="adminPurge()" style="background:#500; width:100%;">PURGE_LOGS</button>
            <button class="btn" onclick="closeAdmin()"
                style="width:100%; border-color:#fff; color:#fff;">BACK_TO_TERMINAL</button>
        </div>
    </div>

    <div id="terminal">
        <div id="header">
            <span>TARGET: <span id="chan-label" style="color:#fff;">...</span></span>
            <button onclick="location.reload()" class="btn-sm">DISCONNECT</button>
        </div>

        <div id="chat-box"></div>

        <div id="reply-preview" class="hidden"
            style="background:rgba(255,0,0,0.1); padding:8px; font-size:0.8em; border-top:1px solid red;">
            Replying to <span id="reply-to" style="color:#fff;"></span>... <span onclick="cancelReply()"
                style="float:right; cursor:pointer; color:#fff;">[CANCEL]</span>
        </div>

        <div style="border-top:1px solid #200; padding-top:10px; display:flex;">
            <span style="margin-right:10px; font-weight:bold;">></span>
            <input type="text" id="chat-in" placeholder="Command..." autofocus autocomplete="off">
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false, lastId = 0, replyData = null;

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('chan-label').innerText = target;
            document.getElementById('chat-in').focus(); // Autofocus after login
            sync();
            setInterval(sync, 2500);
        }

        async function sync() {
            try {
                const res = await fetch(`/api/messages?user=${user}&target=${target}&is_group=${isGroup}&last_id=${lastId}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    const box = document.getElementById('chat-box');
                    data.forEach(m => {
                        if (document.getElementById(`msg-${m.id}`)) return;
                        const div = document.createElement('div');
                        div.className = 'msg-container';
                        div.id = `msg-${m.id}`;

                        let time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
                        let p = m.parent_content ? `<div class="reply-quote">${m.parent_sender}: ${m.parent_content}</div>` : '';

                        div.innerHTML = `
                        <div class="usr">
                            ${m.sender} <span class="ts">${time}</span> 
                            <span class="reply-link" onclick="setReply('${m.sender}','${m.content}')">[reply]</span>
                        </div>
                        ${p}
                        <div style="color:red; margin-top:3px;">${m.content}</div>`;

                        box.appendChild(div);
                        if (m.id > lastId) lastId = m.id;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            } catch (e) { }
        }

        function setReply(s, c) {
            replyData = { parent_sender: s, parent_content: c };
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('reply-to').innerText = s;
            document.getElementById('chat-in').focus();
        }

        function cancelReply() {
            replyData = null;
            document.getElementById('reply-preview').classList.add('hidden');
            document.getElementById('chat-in').focus();
        }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value; e.target.value = "";
                const payload = { sender: user, recipient: target, content: val, is_group: isGroup, ...replyData };
                cancelReply();
                await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                sync();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.code === 'KeyX') {
                document.getElementById('admin-overlay').classList.remove('hidden');
            }
        });

        function closeAdmin() {
            document.getElementById('admin-overlay').classList.add('hidden');
            document.getElementById('chat-in').focus(); // Autofocus after admin close
        }

        async function adminPurge() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p }) });
            if (res.status === 200) { alert("PURGE_COMPLETE"); lastId = 0; document.getElementById('chat-box').innerHTML = ""; closeAdmin(); }
            else { alert("AUTH_FAILED"); }
        }
    </script>
</body>

</html>
