<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HACKER CHAT ZETA</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #1a0000;
            --bg: #050000;
            --green: #0f0;
            --glow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            /* Essential for mobile Chrome address bar handling */
        }

        /* Hacker Scrollbar */
        #chat-box::-webkit-scrollbar {
            width: 4px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: #000;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: var(--red);
            box-shadow: var(--glow);
            border-radius: 10px;
        }

        /* CRT Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        #terminal {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        /* Improved Header Layout */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            border-bottom: 1px solid var(--red);
            flex-shrink: 0;
            background: var(--bg);
            padding: 0 5px;
        }

        /* Chat Body */
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
            position: relative;
        }

        #presence-panel {
            position: sticky;
            top: 0;
            float: right;
            text-align: right;
            pointer-events: none;
            z-index: 5;
        }

        #presence-list {
            color: var(--green);
            font-weight: bold;
            font-size: 0.9em;
            text-shadow: 0 0 5px var(--green);
        }

        #event-log {
            font-size: 0.8em;
            height: 60px;
            overflow: hidden;
            opacity: 1;
            font-weight: bold;
        }

        /* Messages */
        .msg-container {
            margin-bottom: 15px;
            border-left: 2px solid #200;
            padding-left: 10px;
            touch-action: pan-y;
        }

        .usr {
            color: #fff;
            font-weight: bold;
            font-size: 1em;
        }

        .ts {
            color: #500;
            font-size: 0.8em;
            margin: 0 8px;
        }

        .reply-link {
            cursor: pointer;
            color: var(--red);
            text-decoration: underline;
            font-size: 0.8em;
        }

        .reply-quote {
            background: rgba(255, 0, 0, 0.1);
            border-left: 2px solid #fff;
            padding: 5px;
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .content {
            font-size: 1.05em;
            color: var(--red);
            word-break: break-word;
        }

        /* Modals - 70% Transparent Glass */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: rgba(15, 0, 0, 0.85);
            border: 1px solid var(--red);
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: var(--glow);
        }

        .hidden {
            display: none !important;
        }

        .selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            color: #fff;
        }

        /* Input area - FIXED SINGLE ROW LABEL */
        #input-container {
            flex-shrink: 0;
            padding-bottom: 10px;
            border-top: 1px solid #200;
            background: var(--bg);
        }

        #reply-bar {
            display: none;
            background: rgba(255, 0, 0, 0.15);
            padding: 8px;
            font-size: 0.8em;
            border-top: 1px solid red;
            color: #fff;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px 0;
        }

        #chat-label {
            white-space: nowrap;
            /* Forces label to stay on one line */
            flex-shrink: 0;
            /* Prevents the label from squashing */
            margin-right: 5px;
            font-weight: bold;
            max-width: 50%;
            /* If username is massive, it won't kill the layout */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        input#chat-in {
            flex-grow: 1;
            background: transparent;
            border: none !important;
            color: #fff;
            font-family: inherit;
            font-size: 1.1em;
            outline: none;
            padding: 0;
        }

        /* Modal Inputs */
        .modal input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: #fff;
            font-family: inherit;
            width: 100%;
            padding: 12px;
            outline: none;
            margin-bottom: 10px;
        }

        .btn {
            background: #300;
            color: var(--red);
            border: 1px solid var(--red);
            padding: 12px;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            text-transform: uppercase;
            margin: 5px 0;
        }

        .btn:hover {
            background: var(--red);
            color: #000;
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            vertical-align: middle;
        }

        .dot-online {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 1s infinite;
        }

        .dot-offline {
            background: #400;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div id="notif-area" style="position:fixed; bottom:100px; right:20px; z-index:5000;"></div>

    <!-- UI ALERTS -->
    <div id="alert-overlay" class="overlay hidden" style="z-index: 6000;">
        <div class="modal">
            <h2 id="alert-title" style="color:#fff">SYSTEM_MSG</h2>
            <p id="alert-msg"></p>
            <button class="btn" onclick="closeAlert()">ACKNOWLEDGE</button>
        </div>
    </div>

    <!-- UI CONFIRM -->
    <div id="confirm-overlay" class="overlay hidden" style="z-index: 5500;">
        <div class="modal">
            <h2 style="color:#fff">!! WARNING !!</h2>
            <p id="confirm-msg" style="color:#fff"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn" id="confirm-exec">EXECUTE</button>
                <button class="btn" onclick="closeConfirm()"
                    style="background:#000; color:#fff; border-color:#fff;">ABORT</button>
            </div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2 style="color:#fff; letter-spacing: 2px;">UPLINK_INIT</h2>
            <input type="text" id="my-alias" placeholder="IDENT_CODE">
            <input type="text" id="target-id" placeholder="TARGET_NODE">
            <div class="selector">
                <label><input type="radio" name="type" value="private" checked> PRIVATE</label>
                <label><input type="radio" name="type" value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()">ESTABLISH_UPLINK</button>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="admin-overlay" class="overlay hidden" style="z-index:3000;">
        <div class="modal">
            <h2 style="color:#fff">ADMIN_CONSOLE</h2>
            <div style="display:flex; gap:5px;">
                <input type="text" id="adm-user" placeholder="ADMIN_ID">
                <input type="password" id="adm-pass" placeholder="PASSKEY">
            </div>
            <div id="admin-data"
                style="height:150px; overflow-y:auto; background:#080000; border:1px solid #300; color:var(--green); text-align:left; padding:10px; font-size:0.8em; margin:10px 0;">
                Auth required...</div>
            <button class="btn" onclick="adminFetch()">STATS</button>
            <button class="btn" onclick="triggerPurge()" style="background:#600;">PURGE_LOGS</button>
            <button class="btn" onclick="closeAdmin()"
                style="border-color:#fff; color:#fff; background:transparent;">EXIT</button>
        </div>
    </div>

    <div id="terminal">
        <div id="header">
            <span style="font-weight:bold; font-size: 0.9em;">TARGET: <span id="chan-label"
                    style="color:#fff">...</span> <span id="target-dot" class="dot hidden"></span></span>
            <button onclick="location.reload()"
                style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; font-size:0.75em; padding:4px 10px;">DISCONNECT</button>
        </div>

        <div id="chat-box">
            <div id="presence-panel">
                <div id="presence-list">SCANNING...</div>
                <div id="event-log"></div>
            </div>
            <div id="messages"></div>
        </div>

        <div id="reply-bar">
            <span>Replying to <span id="reply-user" style="color:#f00; font-weight:bold;"></span>...</span>
            <span onclick="cancelReply()" style="float:right; cursor:pointer;">[X]</span>
        </div>

        <div id="input-container">
            <div class="input-wrap">
                <span id="chat-label" style="color:var(--red);"></span>
                <input type="text" id="chat-in" placeholder="Command..." autofocus autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false, lastId = 0, replyData = null, activeList = [];

        function focusIn() { setTimeout(() => document.getElementById('chat-in').focus(), 50); }
        function closeAlert() { document.getElementById('alert-overlay').classList.add('hidden'); focusIn(); }
        function closeConfirm() { document.getElementById('confirm-overlay').classList.add('hidden'); focusIn(); }

        function uiAlert(msg) { document.getElementById('alert-msg').innerText = msg; document.getElementById('alert-overlay').classList.remove('hidden'); }
        function uiConfirm(msg, cb) { document.getElementById('confirm-msg').innerText = msg; document.getElementById('confirm-overlay').classList.remove('hidden'); document.getElementById('confirm-exec').onclick = () => { closeConfirm(); cb(); }; }

        async function post(url, body) {
            const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            return await r.json();
        }

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return;
            document.getElementById('login-overlay').classList.add('hidden');
            // Ensure the prompt label stays inline
            document.getElementById('chat-label').innerText = user.toUpperCase() + " > ";
            document.getElementById('chan-label').innerText = target;
            if (!isGroup) document.getElementById('target-dot').classList.remove('hidden');
            focusIn(); sync(); setInterval(sync, 2500);
        }

        async function sync() {
            try {
                const data = await post('/api/messages', { user, target, is_group: isGroup, last_id: lastId });
                if (data && data.length > 0) {
                    const container = document.getElementById('messages');
                    data.forEach(m => {
                        if (document.getElementById(`msg-${m.id}`)) return;
                        const div = document.createElement('div');
                        div.className = 'msg-container'; div.id = `msg-${m.id}`;

                        let startX = 0;
                        div.addEventListener('touchstart', e => startX = e.touches[0].clientX);
                        div.addEventListener('touchend', e => { if (e.changedTouches[0].clientX - startX > 60) setReply(m.sender, m.content); });

                        let time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
                        let q = m.parent_content ? `<div class="reply-quote">${m.parent_sender}: ${m.parent_content}</div>` : '';
                        div.innerHTML = `<div class="usr">${m.sender}<span class="ts">${time}</span><span class="reply-link" onclick="setReply('${m.sender}','${m.content}')">[reply]</span></div>${q}<div class="content">${m.content}</div>`;
                        container.appendChild(div);
                        if (m.id > lastId) lastId = m.id;
                    });
                    document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
                }
                updatePresence();
            } catch (e) { }
        }

        async function updatePresence() {
            const current = await post('/api/presence', { target, is_group: isGroup, requester: user });
            if (isGroup) {
                const log = document.getElementById('event-log');
                current.forEach(u => { if (!activeList.includes(u) && u !== user) log.innerHTML = `<div style="color:var(--green)">> ${u} JOINED</div>` + log.innerHTML; });
                activeList.forEach(u => { if (!current.includes(u) && u !== user) log.innerHTML = `<div style="color:var(--red)">> ${u} LEFT</div>` + log.innerHTML; });
                document.getElementById('presence-list').innerText = `ACTIVE_NODES: ${current.length}`;
            } else {
                const online = current.includes(target);
                document.getElementById('target-dot').className = `dot ${online ? 'dot-online' : 'dot-offline'}`;
                document.getElementById('presence-list').innerText = online ? "TARGET_ONLINE" : "TARGET_OFFLINE";
            }
            activeList = current;
        }

        function setReply(s, c) {
            replyData = { parent_sender: s, parent_content: c };
            document.getElementById('reply-user').innerText = s;
            document.getElementById('reply-bar').style.display = 'block';
            focusIn();
        }
        function cancelReply() { replyData = null; document.getElementById('reply-bar').style.display = 'none'; focusIn(); }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value; e.target.value = "";
                const payload = { sender: user, recipient: target, content: val, is_group: isGroup, ...replyData };
                cancelReply(); await post('/api/send', payload); sync();
            }
        });

        window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.code === 'KeyX') document.getElementById('admin-overlay').classList.toggle('hidden'); });
        function closeAdmin() { document.getElementById('admin-overlay').classList.add('hidden'); focusIn(); }

        async function adminFetch() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const d = await post('/api/admin/stats', { user: u, password: p });
            if (d.users) {
                let h = "<b>USERS:</b><br>" + d.users.map(x => `• ${x.username} (Target: ${x.active_target})`).join('<br>');
                h += "<br><br><b>GROUPS:</b><br>" + d.groups.map(x => `• ${x.group_name}`).join('<br>');
                document.getElementById('admin-data').innerHTML = h;
            } else uiAlert("AUTH_FAILED");
        }

        function triggerPurge() { uiConfirm("PURGE GLOBAL LOGS?", adminPurge); }
        async function adminPurge() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const d = await post('/api/admin/clear', { user: u, password: p });
            if (d.status === "purged") { uiAlert("LOGS_WIPED"); document.getElementById('messages').innerHTML = ""; }
        }
    </script>
</body>

</html>
