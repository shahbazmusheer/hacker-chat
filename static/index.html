<!DOCTYPE html>
<html>

<head>
    <title>HACKER CHAT ZETA</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #1a0000;
            --bg: #050000;
            --green: #0f0;
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* Terminal Frame */
        #terminal {
            height: 90vh;
            border: 1px solid var(--red);
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        /* Status Panel (Top Right) */
        #status-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            width: 200px;
            z-index: 50;
        }

        #presence-list {
            font-size: 0.7em;
            color: var(--green);
            margin-bottom: 5px;
        }

        #event-log {
            font-size: 0.65em;
            height: 50px;
            overflow: hidden;
            opacity: 0.8;
        }

        /* Animated Online Dot */
        .dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
        }

        .dot-online {
            background-color: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 1.5s infinite;
        }

        .dot-offline {
            background-color: #400;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* Join/Leave Styles */
        .log-join {
            color: var(--green);
        }

        .log-left {
            color: var(--red);
        }

        .msg {
            margin: 8px 0;
            border-left: 1px solid #300;
            padding-left: 10px;
            font-size: 0.9em;
        }

        .usr {
            color: #fff;
            font-weight: bold;
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            width: 100%;
            font-family: inherit;
            font-size: 1.1em;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #000;
            border: 1px solid var(--red);
            padding: 30px;
            width: 400px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: var(--dark);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>

<body>

    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2>UPLINK_REQUIRED</h2>
            <input type="text" id="my-alias" placeholder="IDENT_CODE"
                style="width: 80%; border: 1px solid #333; margin-bottom: 10px; text-align: center; background: #000; color: #fff;">
            <input type="text" id="target-id" placeholder="TARGET_NODE"
                style="width: 80%; border: 1px solid #333; text-align: center; background: #000; color: #fff;">
            <div style="margin: 15px 0; font-size: 0.8em;">
                <label><input type="radio" name="type" value="private" checked> PRIVATE</label> &nbsp;
                <label><input type="radio" name="type" value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()">INITIALIZE</button>
        </div>
    </div>

    <div id="terminal">
        <div id="status-panel">
            <div id="presence-list">SCANNING...</div>
            <div id="event-log"></div>
        </div>

        <div style="font-size: 0.7em; border-bottom: 1px solid #300; padding-bottom: 5px;">
            <span id="header-text">SYSTEM_IDLE</span>
            <span id="target-status-dot" class="hidden"></span>
        </div>

        <div id="chat-box"></div>

        <div style="display: flex; border-top: 1px solid #200; padding-top: 10px;">
            <span id="prompt" style="margin-right: 10px; font-weight: bold;">></span>
            <input type="text" id="chat-in" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false;
        let activeUsers = [];

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return;

            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('header-text').innerText = `${isGroup ? 'GROUP' : 'USER'}: ${target}`;
            document.getElementById('prompt').innerText = `${user}@${target}:~$`;

            if (!isGroup) document.getElementById('target-status-dot').classList.remove('hidden');

            setInterval(sync, 2500);
            sync();
        }

        async function sync() {
            // 1. Load Messages
            const msgRes = await fetch(`/api/messages?user=${user}&target=${target}&is_group=${isGroup}`);
            const msgs = await msgRes.json();
            document.getElementById('chat-box').innerHTML = msgs.map(m => `
            <div class="msg"><span class="usr">${m.sender}:</span> ${m.content}</div>
        `).join('');
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;

            // 2. Load Presence
            const presRes = await fetch(`/api/presence?target=${target}`);
            const currentActive = await presRes.json();

            if (isGroup) {
                handleGroupEvents(currentActive);
                document.getElementById('presence-list').innerText = `ACTIVE_NODES: ${currentActive.length}`;
            } else {
                // Private Dot Logic
                const isTargetOnline = currentActive.includes(target);
                const dot = document.getElementById('target-status-dot');
                dot.className = `dot ${isTargetOnline ? 'dot-online' : 'dot-offline'}`;
                document.getElementById('presence-list').innerText = isTargetOnline ? "TARGET_ONLINE" : "TARGET_OFFLINE";
            }
            activeUsers = currentActive;
        }

        function handleGroupEvents(newList) {
            const log = document.getElementById('event-log');

            // Who joined?
            newList.forEach(u => {
                if (!activeUsers.includes(u) && u !== user) {
                    log.innerHTML = `<div class="log-join">> ${u} established uplink</div>` + log.innerHTML;
                }
            });

            // Who left?
            activeUsers.forEach(u => {
                if (!newList.includes(u) && u !== user) {
                    log.innerHTML = `<div class="log-left">> ${u} connection lost</div>` + log.innerHTML;
                }
            });
        }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value; e.target.value = "";
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: user, recipient: target, content: val, is_group: isGroup })
                });
                sync();
            }
        });
    </script>
</body>

</html>
