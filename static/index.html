<!DOCTYPE html>
<html>

<head>
    <title>HACKER CHAT</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #1a0000;
            --bg: #050000;
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* CRT Effect */
        body::after {
            content: " ";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        #terminal {
            height: 90vh;
            border: 1px solid var(--red);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: 0 0 15px var(--dark);
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .msg {
            margin: 8px 0;
            border-left: 2px solid var(--red);
            padding-left: 10px;
            font-size: 0.9em;
        }

        .usr {
            color: #fff;
            font-weight: bold;
        }

        input {
            background: transparent;
            border: 1px solid var(--dark);
            color: #fff;
            outline: none;
            padding: 5px;
            font-family: inherit;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #000;
            border: 1px solid var(--red);
            padding: 30px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 30px var(--dark);
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: var(--dark);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            margin: 5px;
        }

        .btn:hover {
            background: var(--red);
            color: #000;
        }

        .admin-data {
            text-align: left;
            font-size: 0.7em;
            height: 150px;
            overflow-y: auto;
            background: #080000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #300;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2 style="letter-spacing: 5px;">UPLINK_INIT</h2>
            <input type="text" id="my-alias" placeholder="YOUR_ID" style="width: 80%; margin-bottom: 10px;">
            <input type="text" id="target-id" placeholder="TARGET_ID_OR_GROUP" style="width: 80%;">
            <div style="margin: 15px 0;">
                <label><input type="radio" name="type" value="private" checked> PRIVATE</label> &nbsp;
                <label><input type="radio" name="type" value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()">ESTABLISH_CONNECTION</button>
        </div>
    </div>

    <!-- ADMIN -->
    <div id="admin-overlay" class="overlay hidden">
        <div class="modal">
            <h2 style="color: #fff;">ADMIN_CONSOLE</h2>
            <input type="text" id="adm-user" placeholder="ADMIN_ID" style="width: 40%;">
            <input type="password" id="adm-pass" placeholder="PASSKEY" style="width: 40%;">
            <div id="admin-data" class="admin-data">Awaiting Auth...</div>
            <button class="btn" onclick="adminFetch()">STATS</button>
            <button class="btn" onclick="adminClear()">PURGE_LOGS</button>
            <hr border="1" color="#200">
            <input type="text" id="new-group" placeholder="GROUP_NAME" style="width: 60%;">
            <button class="btn" onclick="adminCreateGroup()">CREATE</button>
            <br><br>
            <button onclick="closeAdmin()" style="background:none; color:#444; border:none; cursor:pointer;">[ EXIT
                ]</button>
        </div>
    </div>

    <div id="terminal">
        <div
            style="font-size: 0.7em; border-bottom: 1px solid #300; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span>SECURE_SESSION_ACTIVE</span>
            <span id="header-status">OFFLINE</span>
        </div>
        <div id="chat-box"></div>
        <div style="display: flex; align-items: center;">
            <span id="prompt" style="margin-right: 10px; font-weight: bold;">></span>
            <input type="text" id="chat-in" style="flex-grow: 1; border: none;" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false;

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('header-status').innerText = `CONNECTED: ${user} -> ${target}`;
            document.getElementById('prompt').innerText = `${user}@${target}:~$`;
            setInterval(load, 2500);
            load();
        }

        async function load() {
            const res = await fetch(`/api/messages?user=${user}&target=${target}&is_group=${isGroup}`);
            const data = await res.json();
            document.getElementById('chat-box').innerHTML = data.map(m => `
            <div class="msg">
                <span class="usr">${m.sender}:</span> ${m.content}
            </div>`).join('');
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const val = e.target.value; e.target.value = "";
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: user, recipient: target, content: val, is_group: isGroup })
                });
                load();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.code === 'KeyX') document.getElementById('admin-overlay').classList.remove('hidden');
        });

        function closeAdmin() { document.getElementById('admin-overlay').classList.add('hidden'); }

        async function adminFetch() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: u, password: p })
            });
            const data = await res.json();
            if (res.status === 200) {
                let html = "<b>USERS:</b><br>" + data.users.map(x => `• ${x.username} (${new Date(x.last_seen).toLocaleTimeString()})`).join('<br>');
                html += "<br><br><b>GROUPS:</b><br>" + data.groups.map(x => `• ${x.group_name}`).join('<br>');
                document.getElementById('admin-data').innerHTML = html;
            } else alert("AUTH_FAILED");
        }

        async function adminClear() {
            if (!confirm("PURGE ALL MESSAGES?")) return;
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: u, password: p })
            });
            if (res.status === 200) { alert("DATABASE_CLEARED"); load(); }
        }

        async function adminCreateGroup() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value, g = document.getElementById('new-group').value;
            await fetch('/api/admin/create-group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: u, password: p, target: g })
            });
            adminFetch();
        }
    </script>
</body>

</html>
