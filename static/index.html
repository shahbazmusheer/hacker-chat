<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RED_LINE_TERMINAL</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #4b0000;
            --bg-black: #0a0000;
            --glow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        body {
            background-color: var(--bg-black);
            color: var(--primary-red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-shadow: var(--glow);
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #terminal-wrap {
            border: 2px solid var(--dark-red);
            padding: 20px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px var(--dark-red);
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 0.98;
            }

            5% {
                opacity: 0.95;
            }

            100% {
                opacity: 1;
            }
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .msg {
            margin-bottom: 10px;
            border-left: 2px solid var(--dark-red);
            padding-left: 10px;
        }

        .ts {
            color: var(--dark-red);
            font-size: 0.8em;
        }

        .usr {
            font-weight: bold;
            color: #fff;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-family: inherit;
            font-size: 1.2em;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dark-red);
        }
    </style>
</head>

<body>

    <div id="terminal-wrap">
        <div
            style="font-size: 0.8em; border-bottom: 1px solid var(--dark-red); margin-bottom: 10px; padding-bottom: 5px;">
            CMD: [clear-hacker-chat] TO WIPE LOGS | SYSTEM_STATUS: ACTIVE
        </div>
        <div id="chat-box">
            <div id="messages"></div>
        </div>
        <div class="input-line">
            <span id="prompt" style="margin-right:10px; font-weight:bold;">></span>
            <input type="text" id="chat-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const alias = prompt("Enter Hacker Handle:") || "GHOST";
        document.getElementById('prompt').innerText = `${alias.toUpperCase()}@NETWORK:~$`;

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const data = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = data.map(m => `
                <div class="msg">
                    <span class="ts">[${new Date(m.created_at).toLocaleTimeString()}]</span>
                    <span class="usr">${m.sender}:</span> ${m.content}
                </div>`).join('');
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            } catch (e) { }
        }

        document.getElementById('chat-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                const cmd = e.target.value.trim();
                e.target.value = '';

                // SPECIAL COMMAND: CLEAR CHAT
                if (cmd === "clear-hacker-chat") {
                    const pass = prompt("SYSTEM OVERRIDE: ENTER AUTHORIZATION CODE");
                    if (pass && confirm("WARNING: THIS WILL PERMANENTLY WIPE ALL DATABASE LOGS. PROCEED?")) {
                        const res = await fetch('/api/clear', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password: pass })
                        });
                        const status = await res.json();
                        if (status.status === "cleared") {
                            alert("DATABASE WIPED.");
                            loadMessages();
                        } else {
                            alert("ACCESS DENIED: INVALID CODE.");
                        }
                    }
                    return;
                }

                // REGULAR MESSAGE
                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: alias, content: cmd })
                });
                loadMessages();
            }
        });

        setInterval(loadMessages, 2500);
        loadMessages();
    </script>
</body>

</html>
