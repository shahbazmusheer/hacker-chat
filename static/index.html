<!DOCTYPE html>
<html>

<head>
    <title>HACKER CHAT PRO</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #1a0000;
            --bg: #050000;
            --green: #0f0;
            --glow: 0 0 10px rgba(255, 0, 0, 0.8);
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        #terminal {
            height: 90vh;
            border: 1px solid var(--red);
            display: flex;
            flex-direction: column;
            padding: 15px;
            position: relative;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
        }

        /* INCREASED FONT SIZE FOR LOGS */
        #presence-container {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            width: 300px;
            z-index: 100;
            pointer-events: none;
        }

        #presence-list {
            font-size: 1.2em;
            color: var(--green);
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 0 5px var(--green);
        }

        #event-log {
            font-size: 1.1em;
            height: 100px;
            overflow: hidden;
            opacity: 1;
            font-weight: bold;
        }

        .log-join {
            color: var(--green);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .log-left {
            color: var(--red);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        /* DOTS */
        .dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        .dot-online {
            background: var(--green);
            box-shadow: 0 0 12px var(--green);
            animation: pulse 1s infinite;
        }

        .dot-offline {
            background: #400;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* UI ELEMENTS */
        .msg {
            margin: 8px 0;
            border-left: 2px solid var(--red);
            padding-left: 10px;
            font-size: 1.1em;
        }

        .usr {
            color: #fff;
            font-weight: bold;
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-family: inherit;
            font-size: 1.2em;
            width: 100%;
        }

        /* MODALS */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal {
            background: #000;
            border: 1px solid var(--red);
            padding: 30px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 40px var(--red);
        }

        .hidden {
            display: none !important;
        }

        #admin-overlay {
            z-index: 300;
        }

        #confirm-overlay {
            z-index: 400;
        }

        #notification-area {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 500;
        }

        .btn {
            background: var(--dark);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            margin: 5px;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--red);
            color: #000;
        }

        .notify {
            background: #100;
            border: 1px solid var(--red);
            color: #fff;
            padding: 15px;
            margin-top: 10px;
            font-size: 1em;
            box-shadow: var(--glow);
        }

        .admin-data {
            text-align: left;
            font-size: 0.9em;
            height: 150px;
            overflow-y: auto;
            background: #080000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #300;
            color: var(--green);
        }
    </style>
</head>

<body>

    <div id="notification-area"></div>

    <!-- CONFIRMATION MODAL -->
    <div id="confirm-overlay" class="overlay hidden">
        <div class="modal" style="border-color: #fff;">
            <h2 style="color:#fff; animation: blink 0.5s infinite;">!! WARNING !!</h2>
            <p id="confirm-msg" style="color:#fff;">EXECUTE DESTRUCTIVE COMMAND?</p>
            <button class="btn" id="confirm-yes">EXECUTE</button>
            <button class="btn" id="confirm-no" style="color:#fff;">ABORT</button>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2>UPLINK_INIT</h2>
            <input type="text" id="my-alias" placeholder="IDENT_CODE"
                style="border: 1px solid #333; margin-bottom: 10px; text-align: center; background: #000; color: #fff;">
            <input type="text" id="target-id" placeholder="TARGET_NODE"
                style="border: 1px solid #333; text-align: center; background: #000; color: #fff;">
            <div style="margin: 15px 0; display: flex; align-items: center; justify-content: space-evenly;">
                <label style="display:flex; gap:10px; align-items:base-line;"><input type="radio" name="type"
                        value="private" checked> PRIVATE</label>
                <label style="display:flex; gap:10px; align-items:base-line;"><input type="radio" name="type"
                        value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()" style="width: 100%;">ESTABLISH_UPLINK</button>
        </div>
    </div>

    <!-- ADMIN CONSOLE -->
    <div id="admin-overlay" class="overlay hidden">
        <div class="modal">
            <h2 style="color: #fff;">ADMIN_CONSOLE</h2>
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="adm-user" placeholder="ADMIN_ID"
                    style="width: 50%; border: 1px solid #333; background: #000; color: #fff;">
                <input type="password" id="adm-pass" placeholder="PASSKEY"
                    style="width: 50%; border: 1px solid #333; background: #000; color: #fff;">
            </div>
            <div id="admin-data" class="admin-data">Awaiting Authorization...</div>
            <button class="btn" onclick="adminFetch()">STATS</button>
            <button class="btn" onclick="triggerPurge()" style="background: #600;">PURGE_ALL_LOGS</button>
            <hr border="1" color="#200" style="margin: 15px 0;">
            <input type="text" id="new-group" placeholder="NEW_GROUP_ID"
                style="width: 60%; border: 1px solid #333; background: #000; color: #fff;">
            <button class="btn" onclick="adminCreateGroup()">CREATE_GROUP</button>
            <br><br>
            <button onclick="closeAdmin()" style="background:none; color:#444; border:none; cursor:pointer;">[
                EXIT_CONSOLE ]</button>
        </div>
    </div>

    <!-- TERMINAL -->
    <div id="terminal">
        <div id="presence-container">
            <div id="presence-list">SCANNING...</div>
            <div id="event-log"></div>
        </div>
        <div
            style="font-size: 1em; border-bottom: 1px solid #300; padding-bottom: 10px; display: flex; align-items: center;">
            <span id="header-text">SYSTEM_IDLE</span>
            <span id="target-dot" class="dot hidden"></span>
        </div>
        <div id="chat-box"></div>
        <div style="display: flex; align-items: center; border-top: 1px solid #200; padding-top: 10px;">
            <span id="prompt" style="margin-right: 10px; font-weight: bold;">></span>
            <input type="text" id="chat-in" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false, activeUsers = [];

        function notify(t, s = "info") {
            const area = document.getElementById('notification-area');
            const n = document.createElement('div');
            n.className = 'notify';
            n.innerText = `[${s.toUpperCase()}] ${t}`;
            area.appendChild(n);
            setTimeout(() => n.remove(), 4000);
        }

        function hackerConfirm(msg, cb) {
            const o = document.getElementById('confirm-overlay');
            document.getElementById('confirm-msg').innerText = msg;
            o.classList.remove('hidden');
            document.getElementById('confirm-yes').onclick = () => { o.classList.add('hidden'); cb(); };
            document.getElementById('confirm-no').onclick = () => o.classList.add('hidden');
        }

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return notify("CREDENTIALS_MISSING", "fail");
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('header-text').innerText = `${isGroup ? 'GROUP' : 'PRIVATE'}: ${target}`;
            document.getElementById('prompt').innerText = `${user}&${target}:~$`;
            if (!isGroup) document.getElementById('target-dot').classList.remove('hidden');
            document.getElementById('chat-in').focus()
            setInterval(sync, 2500);
            sync();
            notify("UPLINK_ESTABLISHED", "success");
        }

        async function sync() {
            try {
                // 1. Load Messages
                const mRes = await fetch(`/api/messages?user=${user}&target=${target}&is_group=${isGroup}`);
                const msgs = await mRes.json();
                document.getElementById('chat-box').innerHTML = msgs.map(m => `<div class="msg"><span class="usr">${m.sender}:</span> ${m.content}</div>`).join('');
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;

                // 2. Load Presence (Pass 'user' as requester)
                const pRes = await fetch(`/api/presence?target=${target}&is_group=${isGroup}&requester=${user}`);
                const currentUsers = await pRes.json();

                if (isGroup) {
                    handleEvents(currentUsers);
                    document.getElementById('presence-list').innerText = `ACTIVE_NODES: ${currentUsers.length}`;
                } else {
                    // In private chat, currentUsers will contain target name if they are online and looking at us
                    const online = currentUsers.includes(target);
                    document.getElementById('target-dot').className = `dot ${online ? 'dot-online' : 'dot-offline'}`;
                    document.getElementById('presence-list').innerText = online ? "TARGET_ONLINE" : "TARGET_OFFLINE";
                }
                activeUsers = currentUsers;
            } catch (e) { }
        }

        function handleEvents(newList) {
            const log = document.getElementById('event-log');
            newList.forEach(u => { if (!activeUsers.includes(u) && u !== user) log.innerHTML = `<div class="log-join">> ${u} established uplink</div>` + log.innerHTML; });
            activeUsers.forEach(u => { if (!newList.includes(u) && u !== user) log.innerHTML = `<div class="log-left">> ${u} connection lost</div>` + log.innerHTML; });
        }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value !== "") {
                const v = e.target.value; e.target.value = "";
                await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sender: user, recipient: target, content: v, is_group: isGroup }) });
                sync();
            }
        });

        window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.code === 'KeyX') document.getElementById('admin-overlay').classList.toggle('hidden'); });
        function closeAdmin() {
            document.getElementById('admin-overlay').classList.add('hidden');
            document.getElementById('chat-in').focus()
        }

        async function adminFetch() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p }) });
            if (res.status === 200) {
                const d = await res.json();
                document.getElementById('admin-data').innerHTML = `<b>USERS:</b><br>${d.users.map(x => x.username).join(', ')}<br><br><b>GROUPS:</b><br>${d.groups.map(x => x.group_name).join(', ')}`;
                notify("STATS_LOADED", "success");
            } else notify("AUTH_FAIL", "fail");
        }

        function triggerPurge() { hackerConfirm("WIPE ALL DATABASE LOGS?", adminPurge); }
        async function adminPurge() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p }) });
            if (res.status === 200) { notify("LOGS_PURGED", "success"); sync(); } else notify("PURGE_DENIED", "fail");
        }

        async function adminCreateGroup() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value, g = document.getElementById('new-group').value;
            const res = await fetch('/api/admin/create-group', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p, target: g }) });
            if (res.status === 200) { notify("GROUP_CREATED", "success"); adminFetch(); } else notify("DENIED", "fail");
        }
    </script>
</body>

</html>
