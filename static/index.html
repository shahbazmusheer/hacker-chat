<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED_LINE_TERMINAL</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-red: #4b0000;
            --bg-black: #0a0000;
            --glow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        body {
            background-color: var(--bg-black);
            color: var(--primary-red);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-shadow: var(--glow);
        }

        /* CRT Scanline Effect Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* Screen Flicker Animation */
        @keyframes flicker {
            0% {
                opacity: 0.97;
            }

            5% {
                opacity: 0.95;
            }

            10% {
                opacity: 0.9;
            }

            15% {
                opacity: 0.95;
            }

            20% {
                opacity: 0.98;
            }

            100% {
                opacity: 1;
            }
        }

        #terminal-wrap {
            animation: flicker 0.15s infinite;
            border: 2px solid var(--dark-red);
            padding: 20px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px var(--dark-red);
        }

        #header {
            border-bottom: 1px solid var(--dark-red);
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .msg {
            margin-bottom: 10px;
            border-left: 2px solid var(--dark-red);
            padding-left: 10px;
        }

        .ts {
            color: var(--dark-red);
            font-size: 0.8em;
        }

        .usr {
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
        }

        .content {
            color: var(--primary-red);
        }

        .input-line {
            display: flex;
            align-items: center;
            font-size: 1.2em;
        }

        .prompt {
            color: var(--primary-red);
            margin-right: 10px;
            font-weight: bold;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
            text-shadow: 0 0 5px #fff;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dark-red);
        }

        #status-blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div id="terminal-wrap">
        <div id="header">
            <span>STATUS: <span id="status-blink">ENCRYPTED_UPLINK_STABLE</span></span>
            <span>LOCATION: [CLASSIFIED]</span>
            <span>V.1.04-RED</span>
        </div>

        <div id="chat-box">
            <div class="msg">>> SECURITY PROTOCOL LOADED...</div>
            <div class="msg">>> ACCESSING SERVER...</div>
            <div id="messages"></div>
        </div>

        <div class="input-line">
            <span class="prompt" id="usr-prompt">USER@ROOT:~$</span>
            <input type="text" id="chat-input" autofocus autocomplete="off">
        </div>
    </div>

    <script>
        const alias = prompt("Enter Hacker Handle:") || "GHOST";
        document.getElementById('usr-prompt').innerText = `${alias.toUpperCase()}@NETWORK:~$`;

        async function loadMessages() {
            try {
                const res = await fetch('/api/messages');
                const data = await res.json();
                const container = document.getElementById('messages');

                container.innerHTML = data.map(m => `
                <div class="msg">
                    <span class="ts">[${new Date(m.created_at).toLocaleTimeString()}]</span>
                    <span class="usr">${m.sender}:</span> 
                    <span class="content">${m.content}</span>
                </div>
            `).join('');

                const chatBox = document.getElementById('chat-box');
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) { }
        }

        document.getElementById('chat-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                const content = e.target.value;
                e.target.value = '';

                await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: alias, content: content })
                });
                loadMessages();
            }
        });

        setInterval(loadMessages, 2000);
        loadMessages();
    </script>

</body>

</html>
