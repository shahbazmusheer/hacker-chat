<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RED_LINE_ZETA_v5.1</title>
    <style>
        :root {
            --red: #ff0000;
            --dark: #1a0000;
            --bg: #050000;
            --green: #0f0;
            --glow: 0 0 10px #f00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--red);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1000;
        }

        #terminal {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            position: relative;
        }

        /* Header */
        #header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--red);
            padding-bottom: 5px;
            font-size: 0.85em;
            align-items: center;
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        .dot-online {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse 1s infinite;
        }

        .dot-offline {
            background: #400;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* Chat Body */
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding-top: 10px;
            position: relative;
        }

        #presence-panel {
            position: sticky;
            top: 0;
            float: right;
            width: 220px;
            z-index: 100;
            text-align: right;
            pointer-events: none;
        }

        #presence-list {
            color: var(--green);
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #event-log {
            font-size: 0.9em;
            height: 80px;
            overflow: hidden;
            opacity: 1;
            font-weight: bold;
        }

        .log-join {
            color: var(--green);
        }

        .log-left {
            color: var(--red);
        }

        /* Messages */
        .msg-container {
            margin-bottom: 15px;
            border-left: 2px solid var(--dark);
            padding-left: 12px;
            position: relative;
            touch-action: pan-y;
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            margin-bottom: 4px;
        }

        .usr {
            color: #fff;
            font-weight: bold;
        }

        .ts {
            color: #500;
        }

        .dots {
            color: var(--red);
            cursor: pointer;
            padding: 0 5px;
            text-decoration: underline;
        }

        .reply-quote {
            background: #150000;
            border-left: 2px solid #fff;
            padding: 5px;
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .content {
            font-size: 1.05em;
            color: var(--red);
        }

        /* Input and Reply Preview */
        #reply-preview {
            display: none;
            background: #200;
            border-top: 1px solid var(--red);
            padding: 8px;
            font-size: 0.9em;
            color: #fff;
        }

        #input-area {
            display: flex;
            align-items: center;
            border-top: 1px solid #200;
            padding: 8px 0;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 1.1em;
            outline: none;
            width: 100%;
        }

        /* Modals */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #000;
            border: 1px solid var(--red);
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 30px var(--red);
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: var(--dark);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 10px 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            margin: 5px;
        }

        .admin-data {
            height: 180px;
            overflow-y: auto;
            background: #080000;
            border: 1px solid #300;
            color: var(--green);
            text-align: left;
            padding: 10px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        #notif-area {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 3000;
        }

        .toast {
            background: #100;
            border: 1px solid var(--red);
            color: #fff;
            padding: 12px;
            margin-top: 8px;
            font-size: 0.9em;
            box-shadow: var(--glow);
            animation: slide 0.3s;
        }

        @keyframes slide {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div id="notif-area"></div>

    <!-- CONFIRMATION -->
    <div id="confirm-overlay" class="overlay hidden" style="z-index: 4000;">
        <div class="modal">
            <h2 style="color:#fff">CRITICAL_WARNING</h2>
            <p id="confirm-msg" style="color:#fff">EXECUTE DESTRUCTIVE COMMAND?</p>
            <button class="btn" id="confirm-yes">EXECUTE</button>
            <button class="btn" id="confirm-no" style="color:#fff">ABORT</button>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h2 style="color:#fff">UPLINK_INIT</h2>
            <input type="text" id="my-alias" placeholder="IDENT_CODE"
                style="border: 1px solid #333; text-align: center; background: #000; color:#fff;">
            <input type="text" id="target-id" placeholder="TARGET_NODE"
                style="border: 1px solid #333; text-align: center; background: #000; color:#fff;">
            <div style="margin: 15px 0;">
                <label><input type="radio" name="type" value="private" checked> PRIVATE</label> &nbsp;
                <label><input type="radio" name="type" value="group"> GROUP</label>
            </div>
            <button class="btn" onclick="connect()" style="width: 100%;">ESTABLISH_UPLINK</button>
        </div>
    </div>

    <!-- ADMIN CONSOLE (Ctrl+Shift+X) -->
    <div id="admin-overlay" class="overlay hidden" style="z-index: 3000;">
        <div class="modal">
            <h2 style="color:#fff">ADMIN_CONSOLE</h2>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="adm-user" placeholder="ADMIN_ID"
                    style="width:50%; border:1px solid #333; background:#000; color:#fff;">
                <input type="password" id="adm-pass" placeholder="PASSKEY"
                    style="width:50%; border:1px solid #333; background:#000; color:#fff;">
            </div>
            <div id="admin-data" class="admin-data">Authorization required...</div>
            <button class="btn" onclick="adminFetch()">STATS</button>
            <button class="btn" onclick="triggerPurge()" style="background:#600;">PURGE_LOGS</button>
            <hr border="1" color="#200">
            <input type="text" id="new-group" placeholder="NEW_GROUP_ID"
                style="width:60%; border:1px solid #333; background:#000; color:#fff;">
            <button class="btn" onclick="adminCreateGroup()">CREATE</button>
            <br><br>
            <button onclick="closeAdmin()" style="background:none; color:#444; border:none; cursor:pointer;">[ EXIT
                ]</button>
        </div>
    </div>

    <div id="terminal">
        <div id="header">
            <span>TARGET: <span id="chan-label">...</span> <span id="target-dot" class="dot hidden"></span></span>
            <a href="javascript:location.reload()"
                style="color:#fff; text-decoration:none; border:1px solid #fff; padding:2px 5px; font-size:0.8em;">DISCONNECT</a>
        </div>

        <div id="chat-box">
            <div id="presence-panel">
                <div id="presence-list">SCANNING...</div>
                <div id="event-log"></div>
            </div>
            <div id="messages"></div>
        </div>

        <div id="reply-preview">
            <div style="display:flex; justify-content:space-between">
                <span id="reply-text">...</span>
                <span onclick="cancelReply()" style="cursor:pointer; color:#fff;">[X]</span>
            </div>
        </div>

        <div id="input-area">
            <span style="font-weight:bold; margin-right:8px;">></span>
            <input type="text" id="chat-in" placeholder="Command..." autofocus autocomplete="off">
        </div>
    </div>

    <script>
        let user = "", target = "", isGroup = false, lastTimestamp = null, replyData = null, activeUsers = [];

        function notify(t, s = "info") {
            const n = document.createElement('div'); n.className = 'toast';
            n.innerText = `[${s.toUpperCase()}] ${t}`;
            document.getElementById('notif-area').appendChild(n);
            setTimeout(() => n.remove(), 4000);
        }

        function hConfirm(msg, cb) {
            document.getElementById('confirm-msg').innerText = msg;
            document.getElementById('confirm-overlay').classList.remove('hidden');
            document.getElementById('confirm-yes').onclick = () => { document.getElementById('confirm-overlay').classList.add('hidden'); cb(); };
            document.getElementById('confirm-no').onclick = () => document.getElementById('confirm-overlay').classList.add('hidden');
        }

        function connect() {
            user = document.getElementById('my-alias').value.trim();
            target = document.getElementById('target-id').value.trim();
            isGroup = document.querySelector('input[name="type"]:checked').value === "group";
            if (!user || !target) return notify("IDENT_REQUIRED", "fail");

            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('chan-label').innerText = target;
            if (!isGroup) document.getElementById('target-dot').classList.remove('hidden');

            sync();
            setInterval(sync, 2500);
            setInterval(updatePresence, 5000);
            notify("UPLINK_ESTABLISHED", "success");
        }

        async function sync() {
            let url = `/api/messages?user=${user}&target=${target}&is_group=${isGroup}`;
            if (lastTimestamp) url += `&last_ts=${encodeURIComponent(lastTimestamp)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data && data.length > 0) {
                    const container = document.getElementById('messages');
                    data.forEach(m => {
                        if (document.getElementById(`msg-${m.id}`)) return;
                        const div = document.createElement('div');
                        div.className = 'msg-container';
                        div.id = `msg-${m.id}`;

                        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        // Swipe logic
                        let startX = 0;
                        div.addEventListener('touchstart', e => startX = e.touches[0].clientX);
                        div.addEventListener('touchend', e => { if (e.changedTouches[0].clientX - startX > 60) setReply(m.sender, m.content); });

                        let parentHtml = m.parent_content ? `<div class="reply-quote">${m.parent_sender}: ${m.parent_content}</div>` : '';

                        div.innerHTML = `
                        <div class="msg-header">
                            <span class="usr">${m.sender}</span>
                            <span><span class="dots" onclick="setReply('${m.sender}','${m.content}')">[reply]</span> <span class="ts">${time}</span></span>
                        </div>
                        ${parentHtml}
                        <div class="content">${m.content}</div>`;
                        container.appendChild(div);
                        lastTimestamp = m.created_at;
                    });
                    document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
                }
            } catch (e) { }
        }

        async function updatePresence() {
            const res = await fetch(`/api/presence?target=${target}&is_group=${isGroup}&requester=${user}`);
            const current = await res.json();
            if (isGroup) {
                handleEvents(current);
                document.getElementById('presence-list').innerText = `ACTIVE_NODES: ${current.length}`;
            } else {
                const online = current.includes(target);
                document.getElementById('target-dot').className = `dot ${online ? 'dot-online' : 'dot-offline'}`;
                document.getElementById('presence-list').innerText = online ? "TARGET_ONLINE" : "TARGET_OFFLINE";
            }
            activeUsers = current;
        }

        function handleEvents(newList) {
            const log = document.getElementById('event-log');
            newList.forEach(u => { if (!activeUsers.includes(u) && u !== user) log.innerHTML = `<div class="log-join">> ${u} UPLINK_ESTABLISHED</div>` + log.innerHTML; });
            activeUsers.forEach(u => { if (!newList.includes(u) && u !== user) log.innerHTML = `<div class="log-left">> ${u} CONNECTION_LOST</div>` + log.innerHTML; });
        }

        function setReply(s, c) {
            replyData = { parent_sender: s, parent_content: c };
            document.getElementById('reply-preview').style.display = 'block';
            document.getElementById('reply-text').innerText = `REPLYING TO: ${s}`;
            document.getElementById('chat-in').focus();
        }

        function cancelReply() { replyData = null; document.getElementById('reply-preview').style.display = 'none'; }

        document.getElementById('chat-in').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                const val = e.target.value; e.target.value = "";
                const payload = { sender: user, recipient: target, content: val, is_group: isGroup, ...replyData };
                cancelReply();
                await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                sync();
            }
        });

        window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.code === 'KeyX') document.getElementById('admin-overlay').classList.toggle('hidden'); });
        function closeAdmin() { document.getElementById('admin-overlay').classList.add('hidden'); }

        async function adminFetch() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p }) });
            if (res.status === 200) {
                const d = await res.json();
                document.getElementById('admin-data').innerHTML = `<b>ACTIVE:</b> ${d.users.map(x => x.username).join(', ')}<br><br><b>GROUPS:</b> ${d.groups.map(x => x.group_name).join(', ')}`;
                notify("AUTH_GRANTED", "success");
            } else notify("AUTH_DENIED", "fail");
        }

        function triggerPurge() { hConfirm("PURGE ALL LOGS?", adminPurge); }
        async function adminPurge() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value;
            const res = await fetch('/api/admin/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p }) });
            if (res.status === 200) { notify("LOGS_WIPED", "success"); sync(); } else notify("WIPE_DENIED", "fail");
        }

        async function adminCreateGroup() {
            const u = document.getElementById('adm-user').value, p = document.getElementById('adm-pass').value, g = document.getElementById('new-group').value;
            const res = await fetch('/api/admin/create-group', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user: u, password: p, target: g }) });
            if (res.status === 200) { notify("GROUP_CREATED", "success"); adminFetch(); } else notify("DENIED", "fail");
        }
    </script>
</body>

</html>
